name: CI

on:
  pull_request:
    paths-ignore:
      - website/docs/**
  push:
    branches:
      - main
    paths-ignore:
      - website/docs/**
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to release
        required: true
        default: main
        type: string
      release_tag:
        description: GitHub release tag to create in holaOS-releases
        required: true
        type: string
      release_title:
        description: Optional GitHub release title (defaults to holaOS <version>)
        required: false
        type: string
      prerelease:
        description: Mark the GitHub release as a prerelease when first created
        required: true
        default: false
        type: boolean
      release_channel:
        description: Auto-update channel to publish for desktop clients
        required: true
        default: latest
        type: choice
        options:
          - latest
          - beta

permissions:
  contents: read

env:
  HOLABOSS_RELEASES_REPO: holaboss-ai/holaOS-releases

jobs:
  desktop-typecheck:
    if: ${{ github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    env:
      ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install workspace dependencies (covers desktop)
        run: bun install --frozen-lockfile

      - name: Desktop typecheck
        run: bun run desktop:typecheck

  runtime-tests:
    if: ${{ github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Build runtime state store
        run: bun --filter=@holaboss/runtime-state-store run build

      - name: Build runtime harness host
        run: bun --filter=@holaboss/runtime-harness-host run build

      - name: Runtime state store tests
        run: bun --filter=@holaboss/runtime-state-store run test

      - name: Runtime harness host tests
        run: bun --filter=@holaboss/runtime-harness-host run test

  sdk-app-sdk:
    if: ${{ github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun --filter=@holaboss/app-sdk run typecheck

      - name: Run tests
        run: bun --filter=@holaboss/app-sdk run test

      - name: Build
        run: bun --filter=@holaboss/app-sdk run build

  runtime-api-server:
    if: ${{ github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Build runtime state store
        run: bun --filter=@holaboss/runtime-state-store run build

      - name: Runtime API server typecheck
        run: bun --filter=@holaboss/runtime-api-server run typecheck

      - name: Runtime API server tests
        run: bun --filter=@holaboss/runtime-api-server run test

      - name: Runtime API server build
        run: bun --filter=@holaboss/runtime-api-server run build

  ensure-release:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      release_ref: ${{ steps.release_meta.outputs.release_ref }}
      release_sha: ${{ steps.release_meta.outputs.release_sha }}
      release_tag: ${{ steps.release_meta.outputs.release_tag }}
      release_title: ${{ steps.release_meta.outputs.release_title }}
      release_channel: ${{ steps.release_meta.outputs.release_channel }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}

      - name: Compute release metadata
        id: release_meta
        run: |
          release_tag="${{ inputs.release_tag }}"
          if ! printf '%s' "${release_tag}" | grep -Eq '^holaOS-[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "release_tag must match holaOS-YYYY.MDD.R; got ${release_tag}" >&2
            exit 1
          fi

          release_version="${release_tag#holaOS-}"
          release_title="${{ inputs.release_title }}"
          release_channel="${{ inputs.release_channel }}"
          if [ -z "${release_title}" ]; then
            release_title="holaOS ${release_version}"
          fi
          if [ "${release_channel}" != "latest" ] && [ "${release_channel}" != "beta" ]; then
            echo "release_channel must be one of: latest, beta; got ${release_channel}" >&2
            exit 1
          fi
          if [ "${release_channel}" = "beta" ] && [ "${{ inputs.prerelease }}" != "true" ]; then
            echo "beta channel releases must be marked as prerelease" >&2
            exit 1
          fi
          if [ "${release_channel}" = "latest" ] && [ "${{ inputs.prerelease }}" = "true" ]; then
            echo "latest channel releases must not be marked as prerelease" >&2
            exit 1
          fi

          {
            echo "release_ref=${{ inputs.ref }}"
            echo "release_sha=$(git rev-parse HEAD)"
            echo "release_tag=${release_tag}"
            echo "release_title=${release_title}"
            echo "release_channel=${release_channel}"
          } >> "${GITHUB_OUTPUT}"

      - name: Ensure release tag is available
        env:
          GH_TOKEN: ${{ secrets.HOLABOSS_RELEASES_REPO_TOKEN }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
          RELEASE_GH_REPO: holaboss-ai/holaOS-releases
        run: |
          if [ -z "${GH_TOKEN}" ]; then
            echo "manual release publishing to ${RELEASE_GH_REPO} requires HOLABOSS_RELEASES_REPO_TOKEN" >&2
            exit 1
          fi

          if git ls-remote --tags "https://github.com/${RELEASE_GH_REPO}.git" "refs/tags/${RELEASE_TAG}" | grep -q .; then
            echo "release tag ${RELEASE_TAG} already exists in ${RELEASE_GH_REPO}" >&2
            exit 1
          fi

          if gh release view "${RELEASE_TAG}" --repo "${RELEASE_GH_REPO}" >/dev/null 2>&1; then
            echo "release ${RELEASE_TAG} already exists in ${RELEASE_GH_REPO}" >&2
            exit 1
          fi

  release-linux-runtime:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: ensure-release
    permissions:
      contents: write
    uses: ./.github/workflows/publish-linux-runtime.yml
    with:
      ref: ${{ needs.ensure-release.outputs.release_ref }}
      release_tag: ${{ needs.ensure-release.outputs.release_tag }}
      release_title: ${{ needs.ensure-release.outputs.release_title }}
      prerelease: ${{ inputs.prerelease }}
      release_channel: ${{ needs.ensure-release.outputs.release_channel }}
      artifact_only: true
    secrets: inherit

  release-macos-desktop:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: ensure-release
    runs-on: macos-latest
    env:
      RELEASE_TAG: ${{ needs.ensure-release.outputs.release_tag }}
      RELEASE_CHANNEL: ${{ needs.ensure-release.outputs.release_channel }}
      HOLABOSS_RELEASE_CHANNEL: ${{ needs.ensure-release.outputs.release_channel }}
      DESKTOP_ASSET_PREFIX: holaboss-desktop-macos
      DESKTOP_RELEASE_ASSET_NAME: holaOS-macos-arm64.dmg
      MAC_CERTIFICATE: ${{ secrets.MAC_CERTIFICATE }}
      MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.ensure-release.outputs.release_ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install workspace dependencies (covers desktop)
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: bun install --frozen-lockfile

      - name: Build macOS runtime bundle
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT: production
          HOLABOSS_RUNTIME_VERSION: ${{ env.RELEASE_TAG }}
        run: bash runtime/deploy/package_macos_runtime.sh out/runtime-macos

      - name: Upload runtime Sentry source maps
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: holaboss-runtime
        run: |
          npx @sentry/cli sourcemaps upload \
            --release "${{ env.RELEASE_TAG }}" \
            --url-prefix "~/" \
            runtime/api-server/dist

      - name: Build app SDK
        run: bun --filter=@holaboss/app-sdk run build

      - name: Require mac signing and notarization credentials
        run: |
          missing=()
          [ -n "${MAC_CERTIFICATE}" ] || missing+=("MAC_CERTIFICATE")
          [ -n "${MAC_CERTIFICATE_PASSWORD}" ] || missing+=("MAC_CERTIFICATE_PASSWORD")
          [ -n "${APPLE_ID}" ] || missing+=("APPLE_ID")
          [ -n "${APPLE_APP_SPECIFIC_PASSWORD}" ] || missing+=("APPLE_APP_SPECIFIC_PASSWORD")
          [ -n "${APPLE_TEAM_ID}" ] || missing+=("APPLE_TEAM_ID")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "missing required mac release secrets: ${missing[*]}" >&2
            exit 1
          fi

      - name: Build desktop code for macOS release
        working-directory: apps/desktop
        shell: bash
        env:
          HOLABOSS_RELEASE_TAG: ${{ env.RELEASE_TAG }}
          HOLABOSS_RUNTIME_DIR: ${{ github.workspace }}/out/runtime-macos/
          HOLABOSS_AUTH_BASE_URL: ${{ vars.HOLABOSS_AUTH_BASE_URL }}
          HOLABOSS_AUTH_SIGN_IN_URL: ${{ vars.HOLABOSS_AUTH_SIGN_IN_URL }}
          HOLABOSS_BACKEND_BASE_URL: ${{ vars.HOLABOSS_BACKEND_BASE_URL }}
          HOLABOSS_DESKTOP_CONTROL_PLANE_BASE_URL: ${{ vars.HOLABOSS_DESKTOP_CONTROL_PLANE_BASE_URL }}
          HOLABOSS_PROJECTS_URL: ${{ vars.HOLABOSS_PROJECTS_URL }}
          HOLABOSS_MARKETPLACE_URL: ${{ vars.HOLABOSS_MARKETPLACE_URL }}
          HOLABOSS_PROACTIVE_URL: ${{ vars.HOLABOSS_PROACTIVE_URL }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          GITHUB_TOKEN: ${{ github.token }}
          CSC_LINK: ${{ env.MAC_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ env.MAC_CERTIFICATE_PASSWORD }}
        run: |
          soft_limit="$(ulimit -Sn)"
          hard_limit="$(ulimit -Hn)"
          echo "open file limits before build: soft=${soft_limit} hard=${hard_limit}"
          target_limit=65536
          if [ "${hard_limit}" != "unlimited" ] && [ "${hard_limit}" -lt "${target_limit}" ]; then
            target_limit="${hard_limit}"
          fi
          if [ "${soft_limit}" -lt "${target_limit}" ]; then
            ulimit -n "${target_limit}" || true
          fi
          echo "open file limits for build: soft=$(ulimit -Sn) hard=$(ulimit -Hn)"
          npm run prepare:runtime
          npm run prepare:packaged-config
          npm run build

      - name: Upload desktop Sentry source maps
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        working-directory: apps/desktop
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: holaboss-desktop
        run: |
          npx @sentry/cli sourcemaps upload \
            --release "${{ env.RELEASE_TAG }}" \
            --url-prefix "~/" \
            out/dist out/dist-electron

      - name: Build signed macOS app bundle
        id: build_signed_app
        working-directory: apps/desktop
        shell: bash
        env:
          HOLABOSS_RELEASE_TAG: ${{ env.RELEASE_TAG }}
          CSC_LINK: ${{ env.MAC_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ env.MAC_CERTIFICATE_PASSWORD }}
        run: |
          rm -rf out/release
          node scripts/run-electron-builder.mjs \
            --projectDir "$PWD" \
            --publish never \
            --mac dir \
            --arm64 \
            --config.mac.notarize=false
          app_path="$(find out/release -maxdepth 2 -name '*.app' -print -quit)"
          if [ -z "${app_path}" ]; then
            echo "no .app bundle found under apps/desktop/out/release" >&2
            exit 1
          fi
          app_path="$(cd "$(dirname "${app_path}")" && pwd)/$(basename "${app_path}")"
          if [ ! -f "${app_path}/Contents/Resources/app-update.yml" ]; then
            echo "app-update.yml is missing from signed app bundle" >&2
            exit 1
          fi
          packaged_app="${RUNNER_TEMP}/holaOS.app"
          rm -rf "${packaged_app}"
          ditto "${app_path}" "${packaged_app}"
          echo "app_path=${packaged_app}" >> "${GITHUB_OUTPUT}"

      - name: Validate signed macOS app bundle
        working-directory: apps/desktop
        run: |
          app_path="${{ steps.build_signed_app.outputs.app_path }}"
          if [ -z "${app_path}" ] || [ ! -d "${app_path}" ]; then
            echo "signed app bundle was not produced or no longer exists: ${app_path}" >&2
            exit 1
          fi
          codesign --verify --deep --strict --verbose=2 "${app_path}"

      - name: Notarize signed macOS app bundle
        working-directory: apps/desktop
        shell: bash
        run: |
          app_path="${{ steps.build_signed_app.outputs.app_path }}"
          if [ -z "${app_path}" ] || [ ! -d "${app_path}" ]; then
            echo "signed app bundle was not produced correctly: ${app_path}" >&2
            exit 1
          fi
          max_attempts=3
          attempt=1
          while true; do
            log_path="${RUNNER_TEMP}/notarize-app-attempt-${attempt}.log"
            echo "notarization attempt ${attempt}/${max_attempts}"

            if node scripts/notarize-app.mjs "${app_path}" 2>&1 | tee "${log_path}"; then
              break
            fi

            if [ "${attempt}" -ge "${max_attempts}" ]; then
              echo "notarization failed after ${attempt} attempts" >&2
              exit 1
            fi

            if ! grep -Fq "Failed to notarize via notarytool" "${log_path}"; then
              echo "notarization failed with a non-notarytool error; not retrying" >&2
              exit 1
            fi

            if ! grep -Eq \
              'The Internet connection appears to be offline|NSURLErrorDomain Code=-1009|network connection was lost|timed out|temporarily unavailable|could not connect to the server|A server with the specified hostname could not be found' \
              "${log_path}"; then
              echo "notarization failed with a non-retryable error; not retrying" >&2
              exit 1
            fi

            sleep_seconds=$((attempt * 60))
            echo "transient notarization failure detected; retrying after ${sleep_seconds}s" >&2
            sleep "${sleep_seconds}"
            attempt=$((attempt + 1))
          done

      - name: Validate notarized macOS app bundle
        shell: bash
        run: |
          app_path="${{ steps.build_signed_app.outputs.app_path }}"
          if [ -z "${app_path}" ] || [ ! -d "${app_path}" ]; then
            echo "notarized app bundle was not produced: ${app_path}" >&2
            exit 1
          fi
          codesign --verify --deep --strict --verbose=2 "${app_path}"
          spctl -a -vv -t exec "${app_path}"
          xcrun stapler validate "${app_path}"

      - name: Build macOS desktop release artifacts from notarized app bundle
        working-directory: apps/desktop
        shell: bash
        env:
          HOLABOSS_RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          app_path="${{ steps.build_signed_app.outputs.app_path }}"
          if [ -z "${app_path}" ] || [ ! -d "${app_path}" ]; then
            echo "notarized app bundle was not produced correctly: ${app_path}" >&2
            exit 1
          fi
          rm -rf out/release
          node scripts/run-electron-builder.mjs \
            --projectDir "$PWD" \
            --publish never \
            --prepackaged "${app_path}" \
            --mac dmg zip \
            --arm64 \
            --config.mac.notarize=false

      - name: Validate macOS auto-update artifacts
        shell: bash
        run: |
          primary_channel="${RELEASE_CHANNEL:-latest}"
          if [ "${primary_channel}" = "beta" ]; then
            primary_manifest_name="beta-mac.yml"
          else
            primary_manifest_name="latest-mac.yml"
          fi
          dmg_path="$(find apps/desktop/out/release -maxdepth 1 -name '*.dmg' -print -quit)"
          zip_path="$(find apps/desktop/out/release -maxdepth 1 -name '*.zip' ! -name '*.blockmap' -print -quit)"
          manifest_path="apps/desktop/out/release/${primary_manifest_name}"
          if [ -z "${dmg_path}" ]; then
            echo "no DMG found in apps/desktop/out/release" >&2
            exit 1
          fi
          if [ -z "${zip_path}" ]; then
            echo "no macOS zip found in apps/desktop/out/release" >&2
            exit 1
          fi
          if [ ! -f "${manifest_path}" ]; then
            echo "${primary_manifest_name} was not generated" >&2
            exit 1
          fi
          if [ "${primary_channel}" = "latest" ]; then
            beta_manifest_path="apps/desktop/out/release/beta-mac.yml"
            cp "${manifest_path}" "${beta_manifest_path}"
            if [ ! -f "${beta_manifest_path}" ]; then
              echo "beta-mac.yml was not generated for stable-channel compatibility" >&2
              exit 1
            fi
          fi
          if ! zipinfo -1 "${zip_path}" | grep -Eq '^holaOS\.app/'; then
            echo "macOS zip does not contain holaOS.app as the root app bundle" >&2
            exit 1
          fi
          if ! zipinfo -1 "${zip_path}" | grep -Fxq 'holaOS.app/Contents/Resources/app-update.yml'; then
            echo "app-update.yml is missing from final macOS zip" >&2
            exit 1
          fi
          extract_dir="${RUNNER_TEMP}/mac-zip-signature-verify"
          rm -rf "${extract_dir}"
          mkdir -p "${extract_dir}"
          ditto -x -k "${zip_path}" "${extract_dir}"
          extracted_app="${extract_dir}/holaOS.app"
          if [ ! -d "${extracted_app}" ]; then
            echo "holaOS.app was not extracted from the final macOS zip" >&2
            exit 1
          fi
          codesign --verify --deep --strict --verbose=2 "${extracted_app}"
          spctl -a -vv -t exec "${extracted_app}"
          xcrun stapler validate "${extracted_app}"

      - name: Normalize macOS desktop release asset names
        shell: bash
        run: |
          dmg_path="$(find apps/desktop/out/release -maxdepth 1 -name '*.dmg' -print -quit)"
          if [ -z "${dmg_path}" ]; then
            echo "no DMG found in apps/desktop/out/release" >&2
            exit 1
          fi
          cp "${dmg_path}" "apps/desktop/out/release/${DESKTOP_RELEASE_ASSET_NAME}"

      - name: Upload macOS desktop release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.DESKTOP_ASSET_PREFIX }}-${{ inputs.release_tag }}
          path: |
            apps/desktop/out/release/${{ env.DESKTOP_RELEASE_ASSET_NAME }}
            apps/desktop/out/release/*.zip
            apps/desktop/out/release/*.blockmap
            apps/desktop/out/release/*-mac.yml
          if-no-files-found: error

  release-macos-intel-desktop:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: ensure-release
    permissions:
      contents: write
    uses: ./.github/workflows/publish-macos-intel-desktop.yml
    with:
      ref: ${{ needs.ensure-release.outputs.release_ref }}
      release_tag: ${{ needs.ensure-release.outputs.release_tag }}
      prerelease: ${{ inputs.prerelease }}
      release_channel: ${{ needs.ensure-release.outputs.release_channel }}
      artifact_only: true
    secrets: inherit

  release-windows-desktop:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: ensure-release
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ needs.ensure-release.outputs.release_tag }}
      RELEASE_CHANNEL: ${{ needs.ensure-release.outputs.release_channel }}
      HOLABOSS_RELEASE_CHANNEL: ${{ needs.ensure-release.outputs.release_channel }}
      DESKTOP_ASSET_PREFIX: holaboss-desktop-windows
      DESKTOP_RELEASE_ASSET_NAME: holaOS-windows-x64-setup.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.ensure-release.outputs.release_ref }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install workspace dependencies (covers desktop)
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
        run: bun install --frozen-lockfile

      - name: Validate Azure Trusted Signing credentials
        shell: pwsh
        env:
          WINDOWS_SIGNING_ENDPOINT: ${{ vars.WINDOWS_SIGNING_ENDPOINT }}
          WINDOWS_SIGNING_ACCOUNT_NAME: ${{ vars.WINDOWS_SIGNING_ACCOUNT_NAME }}
          WINDOWS_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ vars.WINDOWS_SIGNING_CERTIFICATE_PROFILE_NAME }}
          WINDOWS_SIGNING_PUBLISHER_NAME: ${{ vars.WINDOWS_SIGNING_PUBLISHER_NAME }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          $requiredSigningEnv = @(
            "WINDOWS_SIGNING_ENDPOINT",
            "WINDOWS_SIGNING_ACCOUNT_NAME",
            "WINDOWS_SIGNING_CERTIFICATE_PROFILE_NAME",
            "WINDOWS_SIGNING_PUBLISHER_NAME",
            "AZURE_TENANT_ID",
            "AZURE_CLIENT_ID",
            "AZURE_CLIENT_SECRET"
          )
          $missingSigningEnv = @(
            foreach ($name in $requiredSigningEnv) {
              if (-not [Environment]::GetEnvironmentVariable($name)) {
                $name
              }
            }
          )
          if ($missingSigningEnv.Count -gt 0) {
            throw "Windows desktop release requires Azure Trusted Signing configuration. Missing: $($missingSigningEnv -join ', ')"
          }

          $tokenUri = "https://login.microsoftonline.com/$env:AZURE_TENANT_ID/oauth2/v2.0/token"
          $tokenBody = @{
            client_id = $env:AZURE_CLIENT_ID
            client_secret = $env:AZURE_CLIENT_SECRET
            grant_type = "client_credentials"
            scope = "https://codesigning.azure.net/.default"
          }

          try {
            $tokenResponse = Invoke-RestMethod `
              -Method Post `
              -Uri $tokenUri `
              -ContentType "application/x-www-form-urlencoded" `
              -Body $tokenBody `
              -ErrorAction Stop
          } catch {
            $errorBody = $_.ErrorDetails.Message
            if ($errorBody -match "AADSTS7000215|invalid_client") {
              throw "Azure client secret validation failed. Update AZURE_CLIENT_SECRET to the client secret Value from Microsoft Entra, not the Secret ID."
            }
            if ($errorBody) {
              Write-Host "Azure token endpoint response: $errorBody"
            }
            throw "Azure Trusted Signing credential validation failed before build."
          }

          if (-not $tokenResponse.access_token) {
            throw "Azure token endpoint did not return an access token for Trusted Signing."
          }

          Write-Host "Azure Trusted Signing service principal credentials validated."

      - name: Validate Azure Trusted Signing authorization
        shell: pwsh
        env:
          WINDOWS_SIGNING_ENDPOINT: ${{ vars.WINDOWS_SIGNING_ENDPOINT }}
          WINDOWS_SIGNING_ACCOUNT_NAME: ${{ vars.WINDOWS_SIGNING_ACCOUNT_NAME }}
          WINDOWS_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ vars.WINDOWS_SIGNING_CERTIFICATE_PROFILE_NAME }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          try {
            Install-PackageProvider -Name NuGet -MinimumVersion 2.8.5.201 -Force -Scope CurrentUser
          } catch {
            Write-Host "NuGet package provider setup did not complete cleanly; continuing because it may already be installed."
            Write-Host $_
          }

          Install-Module -Name TrustedSigning -MinimumVersion 0.5.0 -Force -Repository PSGallery -Scope CurrentUser
          Import-Module TrustedSigning -MinimumVersion 0.5.0 -Force

          $probeDir = Join-Path $env:RUNNER_TEMP "trusted-signing-probe"
          New-Item -ItemType Directory -Force -Path $probeDir | Out-Null
          $probePath = Join-Path $probeDir "trusted-signing-probe.exe"
          $probeSourcePath = Join-Path $probeDir "TrustedSigningProbe.cs"
          $probeSource = @"
          public static class TrustedSigningProbe
          {
              public static int Main(string[] args)
              {
                  return 0;
              }
          }
          "@

          Set-Content -Path $probeSourcePath -Value $probeSource -Encoding UTF8
          $cscCandidates = @(
            (Join-Path $env:WINDIR "Microsoft.NET\Framework64\v4.0.30319\csc.exe"),
            (Join-Path $env:WINDIR "Microsoft.NET\Framework\v4.0.30319\csc.exe")
          )
          $csc = $cscCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $csc) {
            throw "Unable to create Azure Trusted Signing probe executable because csc.exe was not found on the Windows runner."
          }

          & $csc /nologo /target:exe /out:$probePath $probeSourcePath
          if ($LASTEXITCODE -ne 0 -or -not (Test-Path $probePath)) {
            throw "Unable to create Azure Trusted Signing probe executable. csc.exe exited with code $LASTEXITCODE."
          }

          try {
            Invoke-TrustedSigning `
              -Endpoint $env:WINDOWS_SIGNING_ENDPOINT `
              -CertificateProfileName $env:WINDOWS_SIGNING_CERTIFICATE_PROFILE_NAME `
              -CodeSigningAccountName $env:WINDOWS_SIGNING_ACCOUNT_NAME `
              -TimestampRfc3161 "http://timestamp.acs.microsoft.com" `
              -TimestampDigest "SHA256" `
              -FileDigest "SHA256" `
              -Files $probePath
          } catch {
            $signingError = $_ | Out-String
            if ($signingError -match "403|Forbidden") {
              throw "Azure Trusted Signing authorization probe failed with 403 Forbidden. Confirm the service principal has Artifact Signing Certificate Profile Signer on the certificate profile or account, then wait for Azure role propagation."
            }
            throw
          }

          $probeSignature = Get-AuthenticodeSignature -FilePath $probePath
          if ($probeSignature.Status -ne "Valid") {
            throw "Azure Trusted Signing authorization probe did not produce a valid Authenticode signature. Status: $($probeSignature.Status). $($probeSignature.StatusMessage)"
          }

          Write-Host "Azure Trusted Signing authorization validated with a signed probe executable."

      - name: Build app SDK
        run: bun --filter=@holaboss/app-sdk run build

      - name: Build Windows desktop installer
        id: build_windows_installer
        working-directory: apps/desktop
        shell: pwsh
        env:
          HOLABOSS_RELEASE_TAG: ${{ env.RELEASE_TAG }}
          HOLABOSS_AUTH_BASE_URL: ${{ vars.HOLABOSS_AUTH_BASE_URL }}
          HOLABOSS_AUTH_SIGN_IN_URL: ${{ vars.HOLABOSS_AUTH_SIGN_IN_URL }}
          HOLABOSS_BACKEND_BASE_URL: ${{ vars.HOLABOSS_BACKEND_BASE_URL }}
          HOLABOSS_DESKTOP_CONTROL_PLANE_BASE_URL: ${{ vars.HOLABOSS_DESKTOP_CONTROL_PLANE_BASE_URL }}
          HOLABOSS_PROJECTS_URL: ${{ vars.HOLABOSS_PROJECTS_URL }}
          HOLABOSS_MARKETPLACE_URL: ${{ vars.HOLABOSS_MARKETPLACE_URL }}
          HOLABOSS_PROACTIVE_URL: ${{ vars.HOLABOSS_PROACTIVE_URL }}
          GITHUB_TOKEN: ${{ github.token }}
          WINDOWS_SIGNING_ENDPOINT: ${{ vars.WINDOWS_SIGNING_ENDPOINT }}
          WINDOWS_SIGNING_ACCOUNT_NAME: ${{ vars.WINDOWS_SIGNING_ACCOUNT_NAME }}
          WINDOWS_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ vars.WINDOWS_SIGNING_CERTIFICATE_PROFILE_NAME }}
          WINDOWS_SIGNING_PUBLISHER_NAME: ${{ vars.WINDOWS_SIGNING_PUBLISHER_NAME }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_ENVIRONMENT: production
          HOLABOSS_RUNTIME_VERSION: ${{ env.RELEASE_TAG }}
        run: |
          $requiredSigningEnv = @(
            "WINDOWS_SIGNING_ENDPOINT",
            "WINDOWS_SIGNING_ACCOUNT_NAME",
            "WINDOWS_SIGNING_CERTIFICATE_PROFILE_NAME",
            "WINDOWS_SIGNING_PUBLISHER_NAME",
            "AZURE_TENANT_ID",
            "AZURE_CLIENT_ID",
            "AZURE_CLIENT_SECRET"
          )
          $missingSigningEnv = @(
            foreach ($name in $requiredSigningEnv) {
              if (-not [Environment]::GetEnvironmentVariable($name)) {
                $name
              }
            }
          )
          if ($missingSigningEnv.Count -gt 0) {
            throw "Windows desktop release requires Azure Trusted Signing configuration. Missing: $($missingSigningEnv -join ', ')"
          }

          Write-Host "Building Azure Trusted Signing Windows installer."

          npm run dist:win:local
          if ($LASTEXITCODE -ne 0) {
            throw "npm run dist:win:local failed with exit code $LASTEXITCODE"
          }

          $installer = Get-ChildItem -Path out/release -File -Recurse |
            Where-Object {
              $_.Extension -eq ".exe" -and
              $_.Name -notmatch "unins|elevate" -and
              $_.FullName -notmatch "win-unpacked"
            } |
            Sort-Object Length -Descending |
            Select-Object -First 1

          if (-not $installer) {
            if (Test-Path -LiteralPath "out/release") {
              Write-Host "Contents of apps/desktop/out/release:"
              Get-ChildItem -Path out/release -Recurse |
                Select-Object FullName, Length |
                Format-Table -AutoSize
            } else {
              Write-Host "apps/desktop/out/release does not exist."
            }
            throw "No Windows installer .exe was produced under apps/desktop/out/release."
          }

          if (-not (Test-Path -LiteralPath (Join-Path $PWD "out/runtime-windows"))) {
            throw "No staged Windows runtime bundle was produced under apps/desktop/out/runtime-windows."
          }

          $installerPath = $installer.FullName
          $stablePath = Join-Path $PWD "out/release/$env:DESKTOP_RELEASE_ASSET_NAME"
          Copy-Item -LiteralPath $installerPath -Destination $stablePath -Force

          $installerBlockmapPath = "$installerPath.blockmap"
          $stableBlockmapPath = "$stablePath.blockmap"
          if (-not (Test-Path -LiteralPath $installerBlockmapPath)) {
            throw "No Windows installer blockmap was produced for $($installer.Name)."
          }
          Copy-Item -LiteralPath $installerBlockmapPath -Destination $stableBlockmapPath -Force

          foreach ($manifestName in @("latest.yml", "beta.yml")) {
            $manifestPath = Join-Path $PWD "out/release/$manifestName"
            if (-not (Test-Path -LiteralPath $manifestPath)) {
              continue
            }
            $manifestContent = Get-Content -LiteralPath $manifestPath -Raw
            $manifestContent = $manifestContent -replace "(?m)^(\s*-\s*url:\s*).+$", "`${1}$env:DESKTOP_RELEASE_ASSET_NAME"
            $manifestContent = $manifestContent -replace "(?m)^(path:\s*).+$", "`${1}$env:DESKTOP_RELEASE_ASSET_NAME"
            Set-Content -LiteralPath $manifestPath -Value $manifestContent -Encoding UTF8
          }

          $signature = Get-AuthenticodeSignature -FilePath $stablePath
          if ($signature.Status -ne "Valid") {
            $signature | Format-List *
            throw "Windows installer signature is not valid: $($signature.Status)"
          }

          Add-Content -Path $env:GITHUB_OUTPUT -Value "generated_installer_path=$installerPath"
          Add-Content -Path $env:GITHUB_OUTPUT -Value "installer_path=$stablePath"

      - name: Upload desktop Sentry source maps
        if: ${{ env.SENTRY_AUTH_TOKEN != '' }}
        working-directory: apps/desktop
        shell: bash
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: holaboss-desktop
        run: |
          npx @sentry/cli sourcemaps upload \
            --release "${{ env.RELEASE_TAG }}" \
            --url-prefix "~/" \
            out/dist out/dist-electron

      - name: Validate Windows auto-update artifacts
        shell: pwsh
        run: |
          $primaryChannel = if ($env:RELEASE_CHANNEL) { $env:RELEASE_CHANNEL } else { "latest" }
          $manifestName = if ($primaryChannel -eq "beta") { "beta.yml" } else { "latest.yml" }
          $manifestPath = Join-Path $PWD "apps/desktop/out/release/$manifestName"
          if (-not (Test-Path -LiteralPath $manifestPath)) {
            throw "$manifestName was not generated"
          }

          $stableInstallerName = "holaOS-windows-x64-setup.exe"
          $manifestContent = Get-Content -LiteralPath $manifestPath -Raw
          if ($manifestContent -notmatch [regex]::Escape($stableInstallerName)) {
            throw "$manifestName does not reference $stableInstallerName"
          }

          if ($primaryChannel -eq "latest") {
            $betaManifestPath = Join-Path $PWD "apps/desktop/out/release/beta.yml"
            Copy-Item -LiteralPath $manifestPath -Destination $betaManifestPath -Force
            if (-not (Test-Path -LiteralPath $betaManifestPath)) {
              throw "beta.yml was not generated for stable-channel compatibility"
            }
          }

          $stableBlockmapPath = Join-Path $PWD "apps/desktop/out/release/$stableInstallerName.blockmap"
          if (-not (Test-Path -LiteralPath $stableBlockmapPath)) {
            throw "No Windows blockmap was produced for $stableInstallerName."
          }

      - name: Upload Windows release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.DESKTOP_ASSET_PREFIX }}-${{ inputs.release_tag }}
          path: |
            apps/desktop/out/release/${{ env.DESKTOP_RELEASE_ASSET_NAME }}
            apps/desktop/out/release/${{ env.DESKTOP_RELEASE_ASSET_NAME }}.blockmap
            apps/desktop/out/release/latest.yml
            apps/desktop/out/release/beta.yml
          if-no-files-found: error

  publish-release:
    if: >-
      ${{
        always() &&
        github.event_name == 'workflow_dispatch' &&
        needs.ensure-release.result == 'success' &&
        needs.release-linux-runtime.result == 'success' &&
        needs.release-macos-desktop.result == 'success' &&
        needs.release-macos-intel-desktop.result == 'success' &&
        needs.release-windows-desktop.result == 'success'
      }}
    needs:
      - ensure-release
      - release-linux-runtime
      - release-macos-desktop
      - release-macos-intel-desktop
      - release-windows-desktop
    permissions:
      actions: read
      contents: write
    runs-on: ubuntu-latest
    env:
      RELEASE_SHA: ${{ needs.ensure-release.outputs.release_sha }}
      RELEASE_TAG: ${{ needs.ensure-release.outputs.release_tag }}
      RELEASE_TITLE: ${{ needs.ensure-release.outputs.release_title }}
      RELEASE_CHANNEL: ${{ needs.ensure-release.outputs.release_channel }}
      HOLABOSS_RELEASE_CHANNEL: ${{ needs.ensure-release.outputs.release_channel }}
      PRERELEASE: ${{ inputs.prerelease }}
      SOURCE_GH_REPO: ${{ github.repository }}
      RELEASE_GH_REPO: holaboss-ai/holaOS-releases
    steps:
      - name: Checkout release repository helpers
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          ref: ${{ needs.ensure-release.outputs.release_sha }}

      - name: Download Linux runtime release artifacts
        uses: actions/download-artifact@v8
        with:
          name: holaboss-runtime-linux-${{ inputs.release_tag }}
          path: release-assets/linux-runtime

      - name: Download macOS desktop release artifacts
        uses: actions/download-artifact@v8
        with:
          name: holaboss-desktop-macos-${{ inputs.release_tag }}
          path: release-assets/macos-desktop

      - name: Download Intel macOS desktop release artifacts
        uses: actions/download-artifact@v8
        with:
          name: holaboss-desktop-macos-intel-${{ inputs.release_tag }}
          path: release-assets/macos-intel-desktop

      - name: Download Windows desktop release artifacts
        uses: actions/download-artifact@v8
        with:
          name: holaboss-desktop-windows-${{ inputs.release_tag }}
          path: release-assets/windows-desktop

      - name: Merge shared macOS updater manifests
        shell: bash
        run: |
          set -euo pipefail
          merged_manifest_dir="release-assets/macos-updates"
          rm -rf "${merged_manifest_dir}"
          mkdir -p "${merged_manifest_dir}"
          manifest_count=0
          while IFS= read -r arm_manifest_path; do
            manifest_count=$((manifest_count + 1))
            manifest_name="$(basename "${arm_manifest_path}")"
            intel_manifest_path="release-assets/macos-intel-desktop/${manifest_name}"
            if [ ! -f "${intel_manifest_path}" ]; then
              echo "missing Intel macOS updater manifest: ${intel_manifest_path}" >&2
              exit 1
            fi
            ruby apps/desktop/scripts/merge-mac-update-manifests.rb \
              "${merged_manifest_dir}/${manifest_name}" \
              "${arm_manifest_path}" \
              "${intel_manifest_path}"
          done < <(find release-assets/macos-desktop -maxdepth 1 -name '*-mac.yml' -print | sort)
          if [ "${manifest_count}" -eq 0 ]; then
            echo "no Apple Silicon macOS updater manifests were downloaded" >&2
            exit 1
          fi
          while IFS= read -r merged_manifest_path; do
            ruby -e '
              require "yaml"
              manifest = YAML.load_file(ARGV[0])
              files = Array(manifest["files"])
              zip_urls = []
              files.each do |entry|
                next unless entry.is_a?(Hash)
                url = entry["url"].to_s.strip
                next unless url.end_with?(".zip")
                zip_urls << url
              end
              abort("merged macOS updater manifest is missing an arm64 ZIP: #{ARGV[0]}") unless zip_urls.any? { |url| url.include?("arm64") }
              abort("merged macOS updater manifest is missing an Intel ZIP: #{ARGV[0]}") unless zip_urls.any? { |url| !url.include?("arm64") }
            ' "${merged_manifest_path}"
          done < <(find "${merged_manifest_dir}" -maxdepth 1 -name '*-mac.yml' -print | sort)

      - name: Publish validated GitHub release
        env:
          GH_TOKEN: ${{ secrets.HOLABOSS_RELEASES_REPO_TOKEN }}
          SOURCE_GH_TOKEN: ${{ github.token }}
        run: |
          notes_path="$(mktemp)"
          trap 'rm -f "${notes_path}"' EXIT

          if [ -z "${GH_TOKEN}" ]; then
            echo "manual release publishing to ${RELEASE_GH_REPO} requires HOLABOSS_RELEASES_REPO_TOKEN" >&2
            exit 1
          fi

          if gh release view "${RELEASE_TAG}" --repo "${RELEASE_GH_REPO}" >/dev/null 2>&1; then
            echo "release ${RELEASE_TAG} already exists in ${RELEASE_GH_REPO}" >&2
            exit 1
          fi

          if git ls-remote --tags "https://github.com/${RELEASE_GH_REPO}.git" "refs/tags/${RELEASE_TAG}" | grep -q .; then
            echo "release tag ${RELEASE_TAG} already exists in ${RELEASE_GH_REPO}" >&2
            exit 1
          fi

          GH_TOKEN="${SOURCE_GH_TOKEN}" gh api "repos/${SOURCE_GH_REPO}/releases/generate-notes" \
            --method POST \
            -f "tag_name=${RELEASE_TAG}" \
            -f "target_commitish=${RELEASE_SHA}" \
            --jq '.body' > "${notes_path}"

          sed -i.bak \
            -e '/^\*\*Full Changelog\*\*:/d' \
            -e '/^Full Changelog:/d' \
            "${notes_path}"
          rm -f "${notes_path}.bak"

          linux_runtime_dir="release-assets/linux-runtime"
          linux_runtime_asset="${linux_runtime_dir}/holaboss-runtime-linux-x64.tar.gz"
          linux_runtime_checksum_asset="${linux_runtime_dir}/holaboss-runtime-linux-x64.tar.gz.sha256"
          linux_runtime_manifest_asset="${linux_runtime_dir}/holaboss-runtime-linux-x64.json"
          for linux_asset in \
            "${linux_runtime_asset}" \
            "${linux_runtime_checksum_asset}" \
            "${linux_runtime_manifest_asset}"; do
            if [ ! -f "${linux_asset}" ]; then
              echo "missing Linux runtime release asset: ${linux_asset}" >&2
              find "${linux_runtime_dir}" -maxdepth 2 -type f -print >&2 || true
              exit 1
            fi
          done

          mac_dmg_asset="release-assets/macos-desktop/holaOS-macos-arm64.dmg"
          mac_zip_asset="$(find release-assets/macos-desktop -maxdepth 1 -name '*.zip' ! -name '*.blockmap' -print -quit)"
          mac_zip_blockmap_asset="${mac_zip_asset}.blockmap"
          if [ ! -f "${mac_dmg_asset}" ]; then
            echo "missing macOS DMG release asset" >&2
            exit 1
          fi
          if [ -z "${mac_zip_asset}" ] || [ ! -f "${mac_zip_asset}" ]; then
            echo "missing macOS zip release asset" >&2
            exit 1
          fi
          if [ ! -f "${mac_zip_blockmap_asset}" ]; then
            echo "missing macOS zip blockmap release asset" >&2
            exit 1
          fi

          mac_intel_dmg_asset="release-assets/macos-intel-desktop/holaOS-macos-x64.dmg"
          mac_intel_zip_asset="$(find release-assets/macos-intel-desktop -maxdepth 1 -name '*.zip' ! -name '*.blockmap' -print -quit)"
          mac_intel_zip_blockmap_asset="${mac_intel_zip_asset}.blockmap"
          if [ ! -f "${mac_intel_dmg_asset}" ]; then
            echo "missing Intel macOS DMG release asset" >&2
            exit 1
          fi
          if [ -z "${mac_intel_zip_asset}" ] || [ ! -f "${mac_intel_zip_asset}" ]; then
            echo "missing Intel macOS zip release asset" >&2
            exit 1
          fi
          if [ ! -f "${mac_intel_zip_blockmap_asset}" ]; then
            echo "missing Intel macOS zip blockmap release asset" >&2
            exit 1
          fi

          mac_manifest_dir="release-assets/macos-updates"
          if ! find "${mac_manifest_dir}" -maxdepth 1 -name '*-mac.yml' | grep -q .; then
            echo "missing merged macOS updater manifests" >&2
            exit 1
          fi

          upload_paths=()
          declare -A upload_asset_names=()
          append_upload_path() {
            local asset_path="$1"
            local asset_name
            asset_name="$(basename "${asset_path}")"
            if [ -n "${upload_asset_names[${asset_name}]:-}" ]; then
              echo "duplicate release asset name would be uploaded: ${asset_name}" >&2
              exit 1
            fi
            upload_asset_names["${asset_name}"]=1
            upload_paths+=("${asset_path}")
          }

          append_upload_path "${linux_runtime_asset}"
          append_upload_path "${linux_runtime_checksum_asset}"
          append_upload_path "${linux_runtime_manifest_asset}"
          append_upload_path "${mac_dmg_asset}"
          append_upload_path "${mac_zip_asset}"
          append_upload_path "${mac_zip_blockmap_asset}"
          append_upload_path "${mac_intel_dmg_asset}"
          append_upload_path "${mac_intel_zip_asset}"
          append_upload_path "${mac_intel_zip_blockmap_asset}"

          while IFS= read -r manifest_path; do
            append_upload_path "${manifest_path}"
          done < <(find "${mac_manifest_dir}" -maxdepth 1 -name '*-mac.yml' -print | sort)

          windows_release_dir="release-assets/windows-desktop"
          if [ -d "${windows_release_dir}/release" ]; then
            windows_release_dir="${windows_release_dir}/release"
          fi

          windows_installer_asset="${windows_release_dir}/holaOS-windows-x64-setup.exe"
          windows_blockmap_asset="${windows_installer_asset}.blockmap"
          if [ ! -f "${windows_installer_asset}" ]; then
            echo "missing Windows installer release asset" >&2
            find release-assets/windows-desktop -maxdepth 3 -type f -print >&2 || true
            exit 1
          fi
          if [ ! -f "${windows_blockmap_asset}" ]; then
            echo "missing Windows installer blockmap release asset" >&2
            find release-assets/windows-desktop -maxdepth 3 -type f -print >&2 || true
            exit 1
          fi

          append_upload_path "${windows_installer_asset}"
          append_upload_path "${windows_blockmap_asset}"

          windows_manifest_count=0
          for windows_manifest_asset in "${windows_release_dir}/latest.yml" "${windows_release_dir}/beta.yml"; do
            if [ ! -f "${windows_manifest_asset}" ]; then
              continue
            fi
            if ! grep -q 'holaOS-windows-x64-setup\.exe' "${windows_manifest_asset}"; then
              echo "${windows_manifest_asset} does not reference holaOS-windows-x64-setup.exe" >&2
              exit 1
            fi
            append_upload_path "${windows_manifest_asset}"
            windows_manifest_count=$((windows_manifest_count + 1))
          done
          if [ "${windows_manifest_count}" -eq 0 ]; then
            echo "missing Windows auto-update manifest release asset" >&2
            find release-assets/windows-desktop -maxdepth 3 -type f -print >&2 || true
            exit 1
          fi

          prerelease_flag=()
          if [ "${PRERELEASE}" = "true" ]; then
            prerelease_flag+=(--prerelease)
          fi

          gh release create "${RELEASE_TAG}" \
            --repo "${RELEASE_GH_REPO}" \
            --title "${RELEASE_TITLE}" \
            --notes-file "${notes_path}" \
            "${prerelease_flag[@]}" \
            "${upload_paths[@]}"

      # Phase 1 of the GitHub → R2 migration: mirror every binary that
      # the previous step pushed to holaOS-releases up to a Cloudflare
      # R2 bucket so we can validate global download throughput before
      # flipping electron-updater away from `provider: "github"`.
      # GitHub Releases stay authoritative for now — installed clients
      # ignore R2 entirely until a future release flips the
      # `electron-builder.config.cjs` publish config.
      #
      # Soft-gated: missing R2 secrets log a warning and exit 0 so this
      # workflow stays mergeable before the bucket + GH secrets land.
      - name: Mirror release assets to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          # R2 ignores region but the AWS SDK insists on having one set;
          # `auto` is the documented value.
          AWS_DEFAULT_REGION: auto
          # Full endpoint URL — e.g. https://<account-id>.r2.cloudflarestorage.com
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          # Bucket name — e.g. holaos-releases
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          set -euo pipefail

          if [ -z "${AWS_ACCESS_KEY_ID:-}" ] \
              || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ] \
              || [ -z "${R2_ENDPOINT_URL:-}" ] \
              || [ -z "${R2_BUCKET:-}" ]; then
            echo "::warning::R2_* secrets not configured — skipping R2 mirror"
            exit 0
          fi

          # Re-derive the asset list by walking release-assets/. We
          # intentionally don't reuse the previous step's
          # ${upload_paths[@]} array — running a fresh `find` keeps the
          # mirror step self-contained and easy to re-run in isolation.
          mapfile -t assets < <(
            find release-assets -type f \
              \( -name '*.dmg' \
                 -o -name '*.zip' \
                 -o -name '*.exe' \
                 -o -name '*.tar.gz' \
                 -o -name '*.sha256' \
                 -o -name '*.blockmap' \
                 -o -name '*.yml' \
                 -o -name '*.json' \
              \) -print
          )
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "::error::no release assets found under release-assets/ — nothing to mirror"
            exit 1
          fi

          echo "Mirroring ${#assets[@]} asset(s) to R2 bucket: ${R2_BUCKET}"
          for asset in "${assets[@]}"; do
            name="$(basename "${asset}")"
            # Manifests (latest*.yml / beta*.yml / runtime json) drive
            # auto-updater — must be revalidated each check. Binaries
            # carry version in filename, so safe to cache for a year.
            case "${name}" in
              *.yml|*.json|*.sha256)
                cache_control="public, max-age=60, must-revalidate"
                ;;
              *)
                cache_control="public, max-age=31536000, immutable"
                ;;
            esac
            echo "  → ${name}"
            aws s3 cp "${asset}" "s3://${R2_BUCKET}/${name}" \
              --endpoint-url "${R2_ENDPOINT_URL}" \
              --cache-control "${cache_control}" \
              --only-show-errors
          done

          echo "Mirror complete — bucket: ${R2_BUCKET}, ${#assets[@]} files uploaded."
